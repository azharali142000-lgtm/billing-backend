services:
  - type: web
    name: billr-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        value: https://app.billr.example
      - key: FRONTEND_URL
        value: https://app.billr.example
      - key: API_BASE_URL
        value: https://api.billr.example
      - key: CORS_ORIGINS
        value: https://app.billr.example
      - key: VITE_API_URL
        value: https://billing-backend-2v0w.onrender.com
