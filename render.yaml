services:
  - type: web
    name: billr-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run prisma:generate
    startCommand: npx prisma migrate deploy && node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        value: https://app.billr.example
      - key: FRONTEND_URL
        value: https://app.billr.example
      - key: API_BASE_URL
        value: https://api.billr.example
      - key: CORS_ORIGINS
        value: https://app.billr.example
  - type: web
    name: billr-frontend
    env: static
    rootDir: mobile-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://billing-backend-2v0w.onrender.com
